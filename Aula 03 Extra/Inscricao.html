<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <main>
            <form action="Evento.html">
                <label>Digite seu Nome:</label>
                <input type="nome"placeholder="Nome completo">
                <br>
                <label>Digite seu email:</label>
                <input type="email"placeholder="exemplo@gmail.com">
                <br> 
                <label>Digite a data de Nacimento:</label>
                <input type="date">
                <br>
                <label>Forma de participação:</label>
                <input type="radio" name="Modalinade:">
                Presencial
                <input type="radio" name="Modalinade:">
                Online
                <br> 
                <label>Escolha Um Terma:</label>
                <select>
                    <option>Reino das Sombras</option>
                    <option>A Lenda do Último Guardião</option>
                    <option>Ecos do Infinito</option>
                    <option>O Despertar dos Dragões</option>
                    <option>Crônicas da Lua Negra</option>
                    <option>As Ruínas do Destino</option>
                    <option>O Coração do Abismo</option>
                    <option>A Ordem dos Imortais</option>
                    <option>O Reino Esquecido</option>
                    <option>As Chamas da Eternidade</option>
                </select>
                <br>
                <label>Marque seu tipo de Preferencia:</label>
                <br>
                Ação
                <input type="checkbox">
                <br>
                Fantasia 
                <input type="checkbox">
                <br>
                Drama Instorica
                <input type="checkbox">
                <br>
                Yugioh
                <input type="checkbox">
                <br>
                <label>Nível de expectativa:</label>
                <input type="range" min="0" max="10">
                <br>
                <label>Observações:</label>
                <input type="nome"placeholder="Texto">
                <br>
                <input type="submit">
            </form>
        </main>
    </fieldset>
</body>
</html>
